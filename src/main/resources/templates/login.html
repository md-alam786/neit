<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <link rel="stylesheet" href="/css/style.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="login-page">
<div class="login-container">
    <h2>Welcome Back! 👋</h2>

    <!-- Error message -->
    <div th:if="${param.error}" style="color:#fff; background:#e74c3c; padding:10px; border-radius:6px; margin-bottom:15px; font-weight:bold;">
        Invalid username or password. Please try again.
    </div>

    <form th:action="@{/login}" method="post">
        <div class="form-group">
            <label for="username">Email or Username</label>
            <input type="text" id="username" name="username" placeholder="Enter your email or username" required/>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required/>
        </div>
        <button type="submit">Login</button>
    </form>
    <p><a href="#">Forgot Password?</a></p>
    <p>Don't have an account? <a th:href="@{/register}">Sign Up</a></p>
</div>

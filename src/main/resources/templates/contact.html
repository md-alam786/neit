<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Contact Us - Admin Management System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>

<!-- Include header fragment -->
<div th:replace="/fragment :: header"></div>

<img src="/images/cs.png" alt="Background Image"
     style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1; object-fit:cover;" />


<div class="container contact">
<h2>Contact Us</h2>
<form th:action="@{/contact}" method="post">
    <label for="name">Your Name</label>
    <input type="text" id="name" name="name" required>

    <label for="email">Your Email</label>
    <input type="email" id="email" name="email" required>

    <label for="subject">Subject</label>
    <input type="text" id="subject" name="subject" required>

    <label for="message">Message</label>
    <textarea id="message" name="message" required></textarea>

    <button type="submit">Send Message</button>
</form>

<div class="info">
    <p><strong>Address:</strong> Neit Computer Institute, Rajarhat, West Bengal, India</p>
    <p><strong>Email:</strong> info@neit.com | <strong>Phone:</strong> +91-9876543210</p>
    <p>We’ll get back to you within 24 hours.</p>
</div>
</div>

<!-- Include footer fragment -->
<div th:replace="/fragment :: footer"></div>

</body>
</html>

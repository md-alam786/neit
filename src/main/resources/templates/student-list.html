<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Student List</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />

    <!-- DataTables CSS + JS -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">



    <!-- Simple CSS styling -->
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        h2 {
            text-align: center;
        }
        .add-btn {
            display: block;
            width: 150px;
            margin: 20px auto;
            padding: 10px;
            text-align: center;
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        .add-btn:hover {
            background-color: #45a049;
        }
        table {
            border-collapse: collapse;
            width: 80%;
            margin: 20px auto;
        }
        th, td {
            border: 1px solid #333;
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: #eee;
        }
        .action-links a {
            margin: 0 5px;
            text-decoration: none;
            color: #007BFF;
        }
        .action-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<!-- Include header fragment -->
<div th:replace="/fragment :: header"></div>

<div class="container-student-list">
<h2>Student List</h2>

<!-- Add Student Button -->
<a th:href="@{/students/register}" class="add-btn">Add Student</a>

<table id="studentTable">
    <thead>
    <tr>
        <th>ID</th>
        <th>First Name</th>
        <th>Last Name</th>
        <th>DOB</th>
        <th>Email</th>
        <th>Gender</th>
        <th>Qulification</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="student : ${students}">
        <td th:text="${student.studentId}"></td>
        <td th:text="${student.firstName}"></td>
        <td th:text="${student.lastName}"></td>
        <td th:text="${student.dob}"></td>
        <td th:text="${student.email}"></td>
        <td th:text="${student.gender}"></td>
        <td th:text="${student.qualification}"></td>

        <td>
        <div class="action-icons">
            <a th:href="@{/students/view/{id}(id=${student.studentId})}" title="View">
                <i class="fa fa-eye"></i>
            </a>
            <a th:href="@{/students/edit/{id}(id=${student.studentId})}" title="Edit">
                <i class="fa fa-edit"></i>
            </a>
            <form th:action="@{/students/delete/{id}(id=${student.studentId})}" method="post" class="delete-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button type="submit" onclick="return confirm('Are you sure you want to delete this student?')" title="Delete">
                    <i class="fa fa-trash"></i>
                </button>
            </form>
        </div>
</td>
    </tr>
    </tbody>
</table>
</div>

<!-- Include footer fragment -->
<div th:replace="/fragment :: footer"></div>

</body>

<script>
    $(document).ready(function() {
        $('#studentTable').DataTable();
    });
</script>
</html>
